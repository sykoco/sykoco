name: Generate terminal GIF

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install gifos
        run: pip install git+https://github.com/x0rzavi/github-readme-terminal.git@main

      - name: Generate GIF
        run: python main.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIFOS_GENERAL_FPS: "13"
          GIFOS_GENERAL_LOOP_COUNT: "0"
          GIFOS_GENERAL_COLOR_SCHEME: "catppuccin-mocha"
          GIFOS_GENERAL_USER_NAME: "sykoco"

      - name: Commit and push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add output.gif
          git diff --staged --quiet || git commit -m "chore: auto-update terminal GIF [skip ci]"
          git push
